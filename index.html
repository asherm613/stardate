<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stardate Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0e1a;
      color: #cdd7ff;
      text-align: center;
      padding-top: 4rem;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #7aa2ff;
    }
    #stardate {
      font-size: 2rem;
      margin-top: 1rem;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Current Stardate</h1>
  <div id="stardate">Calculating…</div>

  <script>
    function dayOfYear(date) {
      const start = new Date(date.getFullYear(), 0, 1);
      const diff = date - start;
      return Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;
    }

    function calculateStardate() {
      const now = new Date();

      const year = now.getFullYear();
      const doy = dayOfYear(now);

      const seconds =
        now.getHours() * 3600 +
        now.getMinutes() * 60 +
        now.getSeconds();

      const dayFraction = seconds / 86400;

      const base = (year - 1961) * 1000;
      const sd = base + 1000 * ((doy + dayFraction) / 365);

      return sd.toFixed(2);
    }

    function update() {
      document.getElementById("stardate").textContent = calculateStardate();
    }

    // Update the displayed stardate every second
    update();
    setInterval(update, 1000);

    // Reload the entire page every 30 seconds
    setInterval(() => {
      location.reload();
    }, 30000);
  </script>

</body>
</html>
